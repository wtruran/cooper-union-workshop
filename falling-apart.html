<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FALLING APART</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #fff; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      font: 13px/1.4 sans-serif; color: #555;
      background: rgba(255,255,255,0.75); padding: 8px 12px; border-radius: 8px;
      user-select: none;
    }
    #ui input { vertical-align: middle; width: 160px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>
<div id="ui">
  <label>explosion <input id="boom" type="range" min="0.3" max="5" step="0.1" value="1.4"></label>
</div>
<script>
// "FALLING APART" — hover a letter and it shatters into shards that fall to the floor.
// Each letter is laid out and fragmented independently, so they come apart one at a time.

const LINE = "FALLING APART";
const FONT_URL = "https://raw.githubusercontent.com/google/fonts/main/ofl/anton/Anton-Regular.ttf";

let font = null;     // loaded p5.Font (null => fall back to default font)
let letters = [];    // one entry per non-space character

// physics
const G = 0.45;       // gravity per frame
const BOUNCE = 0.42;  // floor restitution
const FRICTION = 0.8; // horizontal damping on contact

function preload() {
  // Try to load the real font; if it fails we silently use p5's default font.
  font = loadFont(FONT_URL, () => {}, () => { font = null; });
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  buildLetters();
}

function draw() {
  background(255);
  noStroke();
  fill(0);

  for (const L of letters) {
    if (L.state === "intact") {
      // Trigger on hover, sampled against the letter's actual glyph shape.
      if (inkAt(L.pg, mouseX - L.bx, mouseY - L.by)) {
        shatterLetter(L);
      } else {
        image(L.pg, L.bx, L.by);
      }
    }
    if (L.state === "falling") {
      for (const s of L.shards) {
        updateShard(s);
        push();
        translate(s.x, s.y);
        rotate(s.angle);
        beginShape();
        for (const v of s.rel) vertex(v.x, v.y);
        endShape(CLOSE);
        pop();
      }
    }
  }

  drawHint();
}

function drawHint() {
  push();
  noStroke();
  fill(0, 90);
  textAlign(CENTER, BASELINE);
  textStyle(NORMAL);
  textSize(14);
  if (font) textFont("sans-serif"); // keep the hint in a plain font
  text("hover the letters", width / 2, height - 28);
  pop();
}

// Lay out the headline and render each letter into its own offscreen buffer.
function buildLetters() {
  letters = [];

  // Auto-size so the line fills ~86% of the width (and isn't too tall).
  push();
  if (font) textFont(font);
  let s = 300;
  textSize(s);
  const total0 = textWidth(LINE) || 1;
  s = s * ((width * 0.86) / total0);
  s = min(s, height * 0.5);
  textSize(s);

  const totalW = textWidth(LINE);
  let curX = (width - totalW) / 2;
  const pad = s * 0.35;          // capture glyph overhang + shard jitter
  const bh = Math.ceil(s * 1.4 + pad * 2);
  const by = Math.round(height / 2 - bh / 2);

  for (const ch of LINE) {
    const w = textWidth(ch);
    if (ch !== " ") {
      const bw = Math.ceil(w + pad * 2);
      const lpg = createGraphics(bw, bh);
      lpg.pixelDensity(1);
      lpg.clear();            // transparent bg so neighbouring buffers don't cover each other
      lpg.fill(0);
      lpg.noStroke();
      if (font) lpg.textFont(font);
      lpg.textAlign(LEFT, CENTER);
      lpg.textSize(s);
      lpg.text(ch, pad, bh / 2);
      lpg.loadPixels();

      const bx = Math.round(curX - pad);
      letters.push({
        char: ch,
        pg: lpg,
        bx,
        by,
        bw, bh,
        box: inkBounds(lpg, bx, by), // tight obstacle box in canvas space
        state: "intact",
        shards: [],
      });
    }
    curX += w;
  }
  pop();
}

// Tight bounding box (in canvas coords) of the ink in a letter buffer.
function inkBounds(lpg, bx, by) {
  let minX = lpg.width, minY = lpg.height, maxX = -1, maxY = -1;
  const px = lpg.pixels;
  for (let y = 0; y < lpg.height; y++) {
    for (let x = 0; x < lpg.width; x++) {
      if (px[(x + y * lpg.width) * 4 + 3] > 128) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) return null;
  return { x: bx + minX, y: by + minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

// Is the pixel at local (lx,ly) inside this buffer part of a black glyph?
function inkAt(lpg, lx, ly) {
  const x = Math.floor(lx), y = Math.floor(ly);
  if (x < 0 || y < 0 || x >= lpg.width || y >= lpg.height) return false;
  const i = (x + y * lpg.width) * 4;
  return lpg.pixels[i + 3] > 128; // alpha channel: opaque = ink, transparent = bg
}

// Fragment one letter into jittered triangular shards covering its ink.
function shatterLetter(L) {
  const lpg = L.pg;
  const cell = 12;
  const cols = Math.ceil(lpg.width / cell);
  const rows = Math.ceil(lpg.height / cell);
  const j = cell * 0.4;

  // Shared jittered grid nodes so neighbouring shards share edges.
  const nodes = [];
  for (let i = 0; i <= cols; i++) {
    nodes[i] = [];
    for (let k = 0; k <= rows; k++) {
      nodes[i][k] = { x: i * cell + random(-j, j), y: k * cell + random(-j, j) };
    }
  }

  const cxLocal = lpg.width / 2;
  const cyLocal = lpg.height / 2;
  const slider = document.getElementById("boom");
  const power = slider ? parseFloat(slider.value) : 1;

  for (let i = 0; i < cols; i++) {
    for (let k = 0; k < rows; k++) {
      const A = nodes[i][k];
      const B = nodes[i + 1][k];
      const C = nodes[i + 1][k + 1];
      const D = nodes[i][k + 1];
      addTriangle(L, lpg, A, B, C, cxLocal, cyLocal, power);
      addTriangle(L, lpg, A, C, D, cxLocal, cyLocal, power);
    }
  }

  L.state = "falling";
}

function addTriangle(L, lpg, p1, p2, p3, cxLocal, cyLocal, power) {
  const c = {
    x: (p1.x + p2.x + p3.x) / 3,
    y: (p1.y + p2.y + p3.y) / 3,
  };
  if (!inkAt(lpg, c.x, c.y)) return;

  const rel = [p1, p2, p3].map(v => ({ x: v.x - c.x, y: v.y - c.y }));
  let radius = 0;
  for (const r of rel) radius = Math.max(radius, Math.hypot(r.x, r.y));

  // Outward burst from the letter's center, scaled by the explosion slider.
  const dx = c.x - cxLocal;
  const dy = c.y - cyLocal;
  L.shards.push({
    x: L.bx + c.x,
    y: L.by + c.y,
    rel,
    radius,
    vx: (dx * 0.06 + random(-1.2, 1.2)) * power,
    vy: (dy * 0.06 + random(-5, -1)) * power,
    angle: 0,
    va: random(-0.15, 0.15) * power,
  });
}

function updateShard(s) {
  s.vy += G;
  s.x += s.vx;
  s.y += s.vy;
  s.angle += s.va;

  collideLetters(s);

  const floorY = height - s.radius;
  if (s.y >= floorY) {
    s.y = floorY;
    if (Math.abs(s.vy) > 1.2) {
      s.vy *= -BOUNCE;
      s.vx *= FRICTION;
      s.va *= 0.6;
    } else {
      s.vy = 0;
      s.vx *= FRICTION;
      s.va *= 0.5;
      if (Math.abs(s.vx) < 0.05) s.vx = 0;
      if (Math.abs(s.va) < 0.005) s.va = 0;
    }
  }

  if (s.x < s.radius) { s.x = s.radius; s.vx *= -0.5; }
  if (s.x > width - s.radius) { s.x = width - s.radius; s.vx *= -0.5; }
}

// Bounce a shard (treated as a circle) off any still-intact letter's box.
function collideLetters(s) {
  for (const L of letters) {
    if (L.state !== "intact" || !L.box) continue;
    const b = L.box;
    const closestX = Math.max(b.x, Math.min(s.x, b.x + b.w));
    const closestY = Math.max(b.y, Math.min(s.y, b.y + b.h));
    let nx = s.x - closestX, ny = s.y - closestY;
    let d2 = nx * nx + ny * ny;
    if (d2 > s.radius * s.radius) continue;

    if (d2 > 0.0001) {
      const d = Math.sqrt(d2);
      nx /= d; ny /= d;
      const overlap = s.radius - d;
      s.x += nx * overlap;
      s.y += ny * overlap;
    } else {
      // Center is inside the box — push out through the nearest edge.
      const left = s.x - b.x, right = b.x + b.w - s.x;
      const top = s.y - b.y, bottom = b.y + b.h - s.y;
      const m = Math.min(left, right, top, bottom);
      if (m === left)        { nx = -1; ny = 0; s.x = b.x - s.radius; }
      else if (m === right)  { nx = 1;  ny = 0; s.x = b.x + b.w + s.radius; }
      else if (m === top)    { nx = 0;  ny = -1; s.y = b.y - s.radius; }
      else                   { nx = 0;  ny = 1;  s.y = b.y + b.h + s.radius; }
    }

    const vn = s.vx * nx + s.vy * ny;
    if (vn < 0) {
      const e = 0.5; // restitution
      s.vx -= (1 + e) * vn * nx;
      s.vy -= (1 + e) * vn * ny;
      s.vx *= 0.92;  // a little tangential drag
      s.va *= 0.9;
    }
  }
}

function mousePressed() {
  // Click anywhere to reassemble the whole headline.
  buildLetters();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildLetters();
}
</script>
</body>
</html>
